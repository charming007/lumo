name: lumo_learner_tablet
description: Voice-first learner app for Lumo MVP
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  audioplayers: ^6.1.0
  flutter_tts: ^4.2.2
  http: ^1.2.2
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  record: ^6.1.2
  speech_to_text: ^7.3.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/lumo_logo.jpg
    - assets/images/mallam_tutor.jpg
    - assets/images/mallam_tutor_cutout.png
    - assets/video/mallam_voice.mp4
    - assets/audio/lesson_complete_chime.wav
    - assets/content_packs/
    - assets/content_packs/lumo-fundamentals/
    - assets/content_packs/lumo-fundamentals/meet_mallam/
